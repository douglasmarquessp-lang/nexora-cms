# Air - Hot reload para Go
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/nexora ./cmd/api"
  bin = "tmp/nexora"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["web", "site", "migrations", "deploy", "tmp", "vendor"]
  delay = 1000
  stop_on_error = true
  log = "build-errors.log"

[log]
  main_only = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
