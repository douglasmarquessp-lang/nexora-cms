run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dupl
    - goconst
    - gocritic
    - gofmt
    - goimports
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: nexora
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
      - style
    disabled-checks:
      - hugeParam
  revive:
    severity: warning
  govet:
    enable-all: true
    disable:
      - fieldalignment
  errcheck:
    check-type-assertions: true
  gosimple:
    checks: ["all"]

issues:
  exclude-dirs:
    - web/node_modules
    - site/node_modules
  exclude-rules:
    - path: internal/pkg/image/image\.go
      linters:
        - goconst
    - path: internal/modules/media/service\.go
      linters:
        - goconst
    - path: internal/modules/auth/oauth\.go
      linters:
        - goconst
    - path: internal/modules/writer/service\.go
      linters:
        - gocritic
    - path: internal/modules/writer/handler_test\.go
      linters:
        - gocritic
    - path: internal/ai/handler_test\.go
      linters:
        - gocritic
    - path: internal/ai/
      linters:
        - misspell
        - prealloc
    - path: internal/ai/prompt_builder\.go
      linters:
        - gocritic
    - path: _test\.go
      linters:
        - errcheck
        - dupl
        - goconst
        - unused
    - path: internal/modules/site/service\.go
      linters:
        - dupl
  max-issues-per-linter: 0
  max-same-issues: 0
