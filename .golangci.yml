run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dupl
    - goconst
    - misspell
    - nakedret
    - revive
    - unconvert
  disable:
    - gosimple

linters-settings:
  revive:
    severity: warning
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
      - unusedwrite
  errcheck:
    check-type-assertions: true

issues:
  exclude-dirs:
    - web/node_modules
    - site/node_modules
  exclude-rules:
    - path: internal/pkg/image/image\.go
      linters:
        - goconst
    - path: internal/modules/media/service\.go
      linters:
        - goconst
    - path: internal/modules/auth/oauth\.go
      linters:
        - goconst
    - path: _test\.go
      linters:
        - errcheck
        - dupl
        - goconst
        - unused
    - path: internal/modules/site/service\.go
      linters:
        - dupl
    - path: internal/modules/editorial/handler\.go
      linters:
        - dupl
    - path: internal/modules/writer/service\.go
      linters:
        - dupl
    - path: internal/modules/media/repository\.go
      linters:
        - dupl
    - path: internal/modules/editorialengine/handler\.go
      linters:
        - dupl
    - path: internal/modules/autocontent/handler\.go
      linters:
        - dupl
    - path: internal/modules/autocontent/service\.go
      linters:
        - dupl
    - linters:
        - staticcheck
      text: "SA1019"
    - linters:
        - staticcheck
      text: "SA1029"
    - linters:
        - staticcheck
      text: "SA9003"
    - linters:
        - staticcheck
      text: "SA4023"
    - path: internal/ai/
      linters:
        - misspell
    - path: internal/pkg/storage/storage_test\.go
      linters:
        - govet
  max-issues-per-linter: 0
  max-same-issues: 0
